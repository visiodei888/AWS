<!DOCTYPE html>
<html>
<head>
<title>My Cloud Learning Journal</title>

<style>
body{
  font-family: Arial;
  margin:40px;
}

/* Tab buttons */
.tab button{
  background-color:#eee;
  border:none;
  padding:10px 20px;
  cursor:pointer;
  font-size:16px;
}

.tab button:hover{
  background-color:#ccc;
}

/* Tab content */
.tabcontent{
  display:none;
  margin-top:20px;
}

img{
  width:400px;
  margin-top:10px;
}
</style>

<script>
function openDay(dayName){
  var i, tabcontent;

  tabcontent=document.getElementsByClassName("tabcontent");

  for(i=0;i<tabcontent.length;i++){
    tabcontent[i].style.display="none";
  }

  document.getElementById(dayName).style.display="block";
}
</script>

</head>

<body>

<h1>My Daily Cloud Learnings</h1>
<p>Welcome! Here I document what I learn about cloud computing every day.</p>

<div class="tab">
  <button onclick="openDay('day1')">Day 1 - IAM</button>
  <button onclick="openDay('day2')">Day 2 - EC2</button>
</div>

<div id="day1" class="tabcontent">
  <h2>Day 1 - AWS IAM</h2>
  <img src="images/day1.png">
  <p>Today I learned about IAM users, groups, and policies.</p>
</div>

<div id="day2" class="tabcontent">
  <h2>Day 2 - AWS EC2</h2>
  <img src="images/day2.png">
  <p>Launched my first EC2 instance and connected using SSH.</p>
</div>

</body>
</html>
